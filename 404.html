<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' https://images.unsplash.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://formspree.io; form-action 'self' https://formspree.io; frame-src 'none'; upgrade-insecure-requests" />

  <title>Page Not Found | BTR Freight Inc.</title>

  <meta name="theme-color" content="#0b1f3a" />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    .nf { min-height: 100vh; display: grid; place-items: center; text-align: center;
      background: linear-gradient(115deg, var(--navy-900), var(--navy-700)); color: #fff; padding: 40px 24px; }
    .nf-code { font-family: var(--font-head); font-weight: 800; font-size: clamp(5rem, 18vw, 9rem); line-height: 1; color: var(--amber); }
    .nf h1 { color: #fff; margin: 6px 0 12px; }
    .nf p { color: #b9c7db; max-width: 48ch; margin: 0 auto 28px; }
    .nf .cta-actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <main class="nf">
    <div>
      <div class="nf-code">404</div>
      <h1>This route hit a dead end</h1>
      <p>The page you're looking for has moved or never existed. Let's get you back on the road.</p>
      <div class="cta-actions">
        <a href="index.html" class="btn btn-primary btn-lg">Back to Home</a>
        <a href="contact.html" class="btn btn-outline-light btn-lg">Contact Us</a>
      </div>
    </div>
  </main>
</body>
</html>
